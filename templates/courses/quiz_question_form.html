{% extends "base.html" %}

{% block title %}
Add Quiz Question | SkillHub
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-md-5">

                    <h1 class="h3 fw-bold">
                        Add quiz question
                    </h1>

                    <p class="text-secondary">
                        Quiz: {{ quiz.title }}
                    </p>

                    <form method="post" novalidate>
                        {% csrf_token %}

                        {% for field in form %}
                        <div class="mb-3">

                            <label for="{{ field.id_for_label }}" class="form-label fw-semibold">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% for error in field.errors %}
                            <div class="text-danger small mt-1">
                                {{ error }}
                            </div>
                            {% endfor %}

                        </div>
                        {% endfor %}

                        <button type="submit" class="btn btn-primary">
                            Add question
                        </button>

                        <a href="{% url 'courses:instructor_quiz_list' course.pk %}" class="btn btn-outline-secondary">
                            Cancel
                        </a>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
